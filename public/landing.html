<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IdeaGit — Instructions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f8; --surface: #ffffff; --surface2: #f0f0f5; --surface3: #e8e8f0;
      --border: #dcdce8; --text: #1a1a2e; --text2: #4a4a6a; --text3: #8888a8;
      --accent: #5b52e8; --accent2: #7b74f0; --shadow: rgba(0,0,0,0.08);
      --r: 8px; --r2: 14px;
    }
    html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; line-height: 1.65; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* NAV */
    nav {
      height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 32px;
      position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 8px var(--shadow);
    }
    .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }
    .logo span { color: var(--accent2); }

    /* PAGE */
    .page { max-width: 700px; margin: 0 auto; padding: 48px 24px 80px; display: flex; flex-direction: column; gap: 32px; align-items: center; }

    /* HERO */
    .hero { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; }
    .hero h1 em { font-style: normal; color: var(--accent); }
    .hero p { font-size: 17px; color: var(--text2); line-height: 1.7; max-width: 480px; }

    /* SLIDESHOW CARD */
    .slide-card {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r2);
      box-shadow: 0 4px 20px var(--shadow);
      overflow: hidden;
      display: flex; flex-direction: column;
    }

    .slide-img-wrap {
      width: 100%; background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .slide-img-wrap img { width: 100%; height: auto; display: block; }

    .slide-content { padding: 26px 28px; display: flex; flex-direction: column; gap: 10px;  }
    .slide-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
    .slide-body { font-size: 15px; color: var(--text2); line-height: 1.75; }
    .slide-body strong { color: var(--text); }

    /* DOTS */
    .slide-dots { display: flex; justify-content: center; gap: 8px; padding: 4px 0 16px; }
    .slide-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); cursor: pointer; transition: background .2s, transform .2s; }
    .slide-dot.active { background: var(--accent); transform: scale(1.3); }

    /* NAV ROW */
    .slide-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .slide-counter { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text3); }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 6px; border: none; border-radius: var(--r); font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; transition: all .15s; text-decoration: none; }
    .btn-secondary { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); padding: 9px 20px; font-size: 14px; }
    .btn-secondary:hover { background: var(--border); }
    .btn-cta {
      background: var(--accent); color: #fff; padding: 14px 36px;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
      border-radius: var(--r2); box-shadow: 0 4px 16px rgba(91,82,232,.3);
      transition: all .2s;
    }
    .btn-cta:hover { background: var(--accent2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(91,82,232,.4); }
    .btn-ghost-nav { background: none; color: var(--text3); border: 1px solid var(--border); padding: 9px 20px; font-size: 14px; }
    .btn-ghost-nav:hover { background: var(--surface3); color: var(--text); }

    /* CTA */
    .cta-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
    .cta-note { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text3); }

    @media (max-width: 560px) {
      .hero h1 { font-size: 30px; }
      .slide-content { padding: 18px 18px; }
      .page { padding: 32px 14px 60px; }
    }
  </style>
</head>
<body>
<nav>
  <div class="logo"><div class="logo-dot"></div>Idea<span>Git</span></div>
</nav>

<div class="page">

  <div class="hero">
    <h1>Welcome to <em>IdeaGit</em></h1>
    <p>IdeaGit is an ideation tool that tracks every version of your idea. Read the steps below before starting.</p>
  </div>

  <!-- Slideshow -->
  <div class="slide-card" id="slide-card">
    <div class="slide-img-wrap" id="lnd-img-wrap">
      <img id="lnd-img" src="" alt=""/>
    </div>
    <div class="slide-content">
      <div class="slide-title" id="lnd-title"></div>
      <div class="slide-body"  id="lnd-body"></div>
    </div>
    <div class="slide-dots" id="lnd-dots"></div>
    <div class="slide-nav">
      <button class="btn btn-ghost-nav" id="lnd-prev" onclick="lndNav(-1)">← Back</button>
      <span class="slide-counter" id="lnd-counter"></span>
      <button class="btn btn-secondary" id="lnd-next" onclick="lndNav(1)">Next →</button>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <a class="btn-cta" href="/app">Open IdeaGit →</a>
    <span class="cta-note">You can re-read these instructions at any time from inside the tool</span>
  </div>

</div>

<script>
const SLIDES = [
  {
    title: '1 · Select a Design Challenge',
    img: 'instructions/slide1.png',
    body: 'Use the dropdown to pick a design challenge and read it carefully. Then click <strong>Start Ideation →</strong> to begin — you will be taken to the ideation workspace.',
  },
  {
    title: '2 · Generate Your First Idea',
    img: 'instructions/slide2.png',
    body: 'Click <strong>Generate Idea</strong> to let AI create an idea from scratch, or type your own title and description then click <strong>Submit Idea</strong>. Ideas are created <strong>one at a time</strong> — use <strong>+ New Idea</strong> in the top bar to start another.',
  },
  {
    title: '3 · Modify Your Idea',
    img: 'instructions/slide3.png',
    body: 'Once an idea is submitted, use the four action buttons to develop it:<br><br><strong>Modify Manually</strong> — edit the idea yourself<br><strong>Modify with AI</strong> — get AI suggestions<br><strong>Finalize</strong> — mark the idea as complete<br><strong>AI Feedback</strong> — get a short critique<br><br>The first three actions create a new node — the original is always preserved.',
  },
  {
    title: '4 · Modify with AI',
    img: 'instructions/slide4.png',
    body: 'Type what you want to change and press Enter — AI will reply with specific suggestions to pick from. Select the ones you want and click <strong>Apply Selected</strong>. Or use <strong>Auto Improve</strong> for one-click AI refinement without typing. Click <strong>Update Idea</strong> to save your changes as a new node.',
  },
  {
    title: '5 · Navigation Bar',
    img: 'instructions/slide5.png',
    body: 'The top bar has everything you need:<br><br><strong>TEXT / GRAPH</strong> — switch between idea editor and visual graph<br><strong>Export CSV</strong> — save your ideas (do this before switching challenges!)<br><strong>+ New Idea</strong> — start a brand new idea branch<br><strong>Instructions</strong> — re-open this guide at any time',
  },
  {
    title: '6 · Graph View',
    img: 'instructions/slide6.png',
    body: 'Click <strong>GRAPH</strong> to see all your ideas as a branching tree. Each node is a version of an idea — modifications branch off from the original. Colours indicate how each node was created (user, AI generated, manual edit, etc.). <strong>Drag</strong> the canvas to pan. <strong>Click any node</strong> to jump back to that version in the editor.',
  },
  {
    title: '7 · Your Task',
    img: 'instructions/slide7.png',
    body: 'Select <strong>one design challenge</strong> and generate at least <strong>5 distinct ideas</strong> using any combination of tools. When done, click <strong>Export CSV</strong> to save your work — this is your submission.<br><br>You are welcome to explore the tool as much as you like. The minimum is <strong>5 ideas for 1 challenge</strong>.',
  },
];

let cur = 0;

function render() {
  const s = SLIDES[cur];
  document.getElementById('lnd-title').textContent = s.title;
  document.getElementById('lnd-body').innerHTML = s.body;
  const imgWrap = document.getElementById('lnd-img-wrap');
  const img = document.getElementById('lnd-img');
  img.src = s.img; img.alt = s.title;
  imgWrap.style.display = '';
  img.onerror = () => { imgWrap.style.display = 'none'; };

  // dots
  const dotsEl = document.getElementById('lnd-dots');
  dotsEl.innerHTML = SLIDES.map((_,i) =>
    `<div class="slide-dot${i===cur?' active':''}" onclick="goSlide(${i})"></div>`
  ).join('');

  document.getElementById('lnd-counter').textContent = `${cur+1} / ${SLIDES.length}`;
  const prev = document.getElementById('lnd-prev');
  const next = document.getElementById('lnd-next');
  prev.style.visibility = cur === 0 ? 'hidden' : '';
  next.textContent = cur === SLIDES.length - 1 ? 'Done' : 'Next →';
  next.className = cur === SLIDES.length - 1 ? 'btn btn-cta' : 'btn btn-secondary';
}

function goSlide(i) { cur = Math.max(0, Math.min(i, SLIDES.length-1)); render(); }
function lndNav(dir) {
  if (dir === 1 && cur === SLIDES.length - 1) { window.location.href = '/app'; return; }
  goSlide(cur + dir);
}

render();
</script>
</body>
</html>
